<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="login.html" class="nav-login active">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="login-container">
        <div class="login-box">
            <h2>Welcome Back</h2>
            <p class="login-subtitle">Login to continue learning</p>
            
            <!-- Role Selection -->
            <div class="role-selector">
                <button class="role-btn active" data-role="student">Student</button>
                <button class="role-btn" data-role="teacher">Teacher</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group" id="usernameGroup" style="display: none;">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Choose a username">
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>

                <div class="form-options">
                    <label class="checkbox">
                        <input type="checkbox"> Remember me
                    </label>
                </div>

                <button type="submit" class="login-btn">Login</button>
                <div style="text-align: center; margin-top: 20px; font-size: 0.9rem; color: #666;">
                    <span id="toggleModeBtn" style="cursor: pointer; transition: 0.3s;">
                        Don't have an account? <strong style="color: #2196F3;">Sign Up</strong>
                    </span>
                </div>
            </form>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
