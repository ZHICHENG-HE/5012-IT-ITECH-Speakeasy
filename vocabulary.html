<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - Vocabulary Learning</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/vocabulary.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="student-dashboard.html">Dashboard</a></li>
                <li><a href="login.html" class="nav-login">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="vocab-container">
        <div class="vocab-card">
            <h2>Vocabulary Learning</h2>
            <!-- Add word -->
            <div class="add-word-section">
                <h3 class="add-word-title">➕ Add New Word</h3>
                <div class="add-word-form">
                    <input type="text" id="newWordInput" class="add-word-input" placeholder="English Word">
                    <input type="text" id="newMeaningInput" class="add-word-input" placeholder="Chinese Meaning">
                    <button id="addNewWordBtn" class="add-word-btn">Add</button>
                </div>
            </div>
            <!-- Word Display -->
            <div class="word-display" id="wordDisplay">
                <!-- Word will be displayed here -->
            </div>

            <!-- Answer Input -->
            <div class="answer-section">
                <input type="text" id="answerInput" placeholder="Enter meaning" class="answer-input">
            </div>

            <!-- Buttons -->
            <div class="button-group">
                <button id="dontKnowBtn" class="vocab-btn dont-know">Don't Know</button>
                <button id="checkBtn" class="vocab-btn check">Check</button>
                <button id="nextBtn" class="vocab-btn next">Next →</button>
            </div>

            <!-- Feedback Message -->
            <div id="feedbackMessage" class="feedback-message"></div>
        </div>
    </div>

    <script src="js/vocabulary.js"></script>
</body>
</html>
