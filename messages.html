<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - Messages</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/messages.css">
</head>

<body style="background-color: #f4f6f9;">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="javascript:history.back()">← Back</a></li>
                <li><a href="login.html" class="nav-login">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="chat-container">
        <div class="contacts-sidebar">
            <div class="contacts-header">💬 Contacts</div>

            <p id="contactLoading" class="status-text">Loading contacts...</p>
            <p id="contactEmpty" class="status-text" style="display: none;">No contacts found.</p>
            <p id="contactError" class="status-error" style="display: none;">Error loading contacts.</p>

            <div class="contact-list" id="contactList"></div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chatHeader">Select a contact to start messaging</div>
            
            <div class="chat-messages" id="chatMessages">
                <div id="chatWelcome" class="welcome-screen">
                    <span class="welcome-emoji">👋</span>
                    Welcome to Message Center
                </div>
                <p id="chatLoading" class="status-text" style="display: none;">Loading messages...</p>
                <p id="chatEmpty" class="status-text" style="display: none;">No messages yet. Say hi! 👋</p>
                <p id="chatError" class="status-error" style="display: none;">Failed to load messages.</p>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="messageInput" class="chat-input" placeholder="Type a message..." disabled>
                <button id="sendBtn" class="chat-send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <template id="contactTemplate">
        <div class="contact-item">
            <span class="contact-name"></span>
            <span class="contact-role"></span>
        </div>
    </template>

    <template id="messageTemplate">
        <div class="message-bubble">
            <div class="message-content"></div>
            <div class="message-time"></div>
        </div>
    </template>

    <script src="js/messages.js"></script>
</body>
</html>
