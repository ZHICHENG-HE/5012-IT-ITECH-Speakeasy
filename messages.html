<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - Messages</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Chat window */
        .chat-container { display: flex; max-width: 1100px; margin: 30px auto; background: #fff; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); height: 75vh; overflow: hidden; border: 1px solid #eee; }
        .contacts-sidebar { width: 300px; background: #f8f9fa; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .contacts-header { padding: 20px; background: #fff; border-bottom: 1px solid #ddd; font-weight: bold; color: #333; }
        .contact-list { overflow-y: auto; flex: 1; }
        .contact-item { padding: 15px 20px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; flex-direction: column; transition: 0.2s; }
        .contact-item:hover { background: #e9ecef; }
        .contact-item.active { background: #e3f2fd; border-left: 4px solid #2196F3; }
        .contact-name { font-weight: bold; color: #333; margin-bottom: 5px; }
        .contact-role { font-size: 12px; color: #fff; padding: 2px 8px; border-radius: 10px; display: inline-block; align-self: flex-start; }
        .role-teacher { background: #FF9800; }
        .role-student { background: #4CAF50; }
        
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #fff; }
        .chat-header { padding: 20px; border-bottom: 1px solid #ddd; font-weight: bold; font-size: 18px; color: #333; }
        .chat-messages { flex: 1; padding: 20px; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; gap: 15px; }
        .message-bubble { max-width: 60%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.4; position: relative; }
        .message-incoming { background: #fff; border: 1px solid #eee; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .message-outgoing { background: #2196F3; color: white; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 1px 2px rgba(33,150,243,0.2); }
        .message-time { font-size: 11px; color: #999; margin-top: 5px; text-align: right; }
        .message-outgoing .message-time { color: #e3f2fd; }
        
        .chat-input-area { padding: 20px; border-top: 1px solid #ddd; display: flex; gap: 10px; background: #fff; }
        .chat-input { flex: 1; padding: 12px 15px; border: 1px solid #ccc; border-radius: 25px; outline: none; font-size: 15px; }
        .chat-send-btn { background: #2196F3; color: white; border: none; padding: 0 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .chat-send-btn:hover { background: #1976D2; }
    </style>
</head>
<body style="background-color: #f4f6f9;">
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="javascript:history.back()">← Back</a></li>
                <li><a href="login.html" class="nav-login">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="chat-container">
        <div class="contacts-sidebar">
            <div class="contacts-header">💬 Contacts</div>
            <div class="contact-list" id="contactList">
                <p style="padding: 20px; color: #888;">Loading contacts...</p>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header" id="chatHeader">Select a contact to start messaging</div>
            
            <div class="chat-messages" id="chatMessages">
                <div style="text-align: center; color: #aaa; margin-top: 50px;">
                    <span style="font-size: 40px;">👋</span><br>
                    Welcome to Message Center
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="messageInput" class="chat-input" placeholder="Type a message..." disabled>
                <button id="sendBtn" class="chat-send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="js/messages.js"></script>
</body>
</html>
