<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - My Assignments</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/assignments.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="student-dashboard.html">Dashboard</a></li>
                <li><a href="login.html" class="nav-login">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="assignments-container">
        <!-- Header -->
        <div class="assignments-header">
            <h1>My Assignments</h1>
            <p>Track and submit your homework</p>
        </div>

        <!-- Assignment Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number" id="statTotal">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="statCompleted">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="statPending">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="statOverdue">0</span>
                <span class="stat-label">Overdue</span>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="overdue">Overdue</button>
        </div>

        <!-- Assignments List -->
        <div class="assignments-list" id="assignmentsList"></div>

        <div id="assignmentsEmpty" class="empty-state-text" style="display: none;"></div>
        <div id="assignmentsError" class="error-text" style="display: none;"></div>
    </div> <template id="assignmentCardTemplate">
        <div class="assignment-card">
            <div class="assignment-card-info">
                <h3 class="assignment-card-title"></h3>
                <p class="assignment-card-meta">
                    <strong>Due:</strong> <span class="due-date-text"></span> | 
                    <strong>Points:</strong> <span class="points-text"></span>
                </p>
                <p class="assignment-card-desc"></p>
            </div>
            
            <div class="assignment-card-action">
                <div class="grade-box" style="display: none;">
                    <span class="score-badge"></span>
                    <p class="feedback-text"></p>
                </div>

                <span class="pending-grade-badge" style="display: none;">✅ Pending Grade</span>

                <a href="#" class="submit-work-btn" style="display: none;">Submit Work</a>
            </div>
        </div>
    </template>

    <script src="js/assignments.js"></script>
</body>
</html>
