<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - My Assignments</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/assignments.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="student-dashboard.html">Dashboard</a></li>
                <li><a href="login.html" class="nav-login">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="assignments-container">
        <!-- Header -->
        <div class="assignments-header">
            <h1>My Assignments</h1>
            <p>Track and submit your homework</p>
        </div>

        <!-- Assignment Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-number" id="statTotal">0</span>
                <span class="stat-label">Total</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="statCompleted">0</span>
                <span class="stat-label">Completed</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="statPending">0</span>
                <span class="stat-label">Pending</span>
            </div>
            <div class="stat-card">
                <span class="stat-number" id="statOverdue">0</span>
                <span class="stat-label">Overdue</span>
            </div>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
            <button class="filter-btn" data-filter="overdue">Overdue</button>
        </div>

        <!-- Assignments List -->
        <div class="assignments-list" id="assignmentsList">
            <!-- Assignment items will be loaded here by JavaScript -->
        </div>
    </div>

    <script src="js/assignments.js"></script>
</body>
</html>
