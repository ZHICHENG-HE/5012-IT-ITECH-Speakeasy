<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - Submit Assignment</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/assignment-submit.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="assignments.html">Assignments</a></li>
                <li><a href="login.html" class="nav-login">Logout</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="submit-container">
        <!-- Back Link -->
        <div style="max-width: 800px; margin: 20px auto 10px;">
            <a href="assignments.html" class="back-btn-styled">
                ← Back to Assignments
            </a>
        </div>

        <p id="assignmentLoading" class="status-text">Loading assignment details...</p>
        <p id="assignmentError" class="error-text" style="display: none;"></p>

        <div class="assignment-detail-card" id="assignmentDetailCard" style="display: none;">
            <div class="assignment-header">
                <h1 class="assignment-title" id="detailTitle"></h1>
            </div>
            
            <p class="assignment-description" id="detailDesc"></p>
            
            <div class="assignment-meta">
                <div class="meta-item">
                    <span class="meta-label">Due Date</span>
                    <span class="meta-value" id="detailDue"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Points</span>
                    <span class="meta-value" id="detailPoints"></span>
                </div>
                <div class="meta-item">
                    <span class="meta-label">Status</span>
                    <span class="meta-value" id="detailStatus" style="text-transform: capitalize;"></span>
                </div>
            </div>
        </div>

        <!-- Submission Form -->
        <div class="submission-form" id="submissionFormArea" style="display: none;">
            <h2>Submit Your Work</h2>
            
            <form id="submitForm">
                <!-- File Upload -->
                <div class="form-group">
                    <label for="assignmentFile">Upload File</label>
                    <div class="file-upload-area" id="fileUploadArea">
                        <input type="file" id="assignmentFile" name="assignmentFile" class="file-input" required>
                        <div class="file-upload-placeholder">
                            <span class="upload-icon">📎</span>
                            <p>Drag & drop or click to upload</p>
                            <p class="file-types">Supported: PDF, DOC, DOCX, TXT (Max 10MB)</p>
                        </div>
                        <div class="file-preview" id="filePreview" style="display: none;">
                            <span class="file-name"></span>
                            <button type="button" class="remove-file">✕</button>
                        </div>
                    </div>
                </div>

                <!-- Submit Buttons -->
                <div class="form-actions">
                    <button type="submit" class="submit-btn">Submit Assignment</button>
                    <button type="button" class="cancel-btn" onclick="window.location.href='assignments.html'">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/assignment-submit.js"></script>
</body>
</html>
