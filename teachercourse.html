<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speakeasy - My Courses</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/teachercourse.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">Speakeasy</a>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="teacher-dashboard.html">Dashboard</a></li>
                <li><a href="login.html" class="nav-login">Logout</a></li>
            </ul>
        </div>
    </nav>

    <div class="container">
        <h1>My Courses</h1>

        <div id="teacherCourseList" class="course-list"></div>

        <div id="emptyState" class="empty-state-box" style="display: none;">
            <span class="empty-state-icon">📭</span>
            <p class="empty-state-text">You haven't created any courses yet.</p>
            <p class="empty-state-subtext">Click the green button above to launch your first course!</p>
        </div>

        <p id="errorState" style="display: none; color: red; padding: 20px; text-align: center;"></p>
    </div>

        <template id="courseCardTemplate">
            <div class="course-item">
                <div class="course-info">
                    <span class="course-title-text"></span>
                    <span class="course-desc-text"></span>
                </div>
                <div class="course-actions">
                    <span class="student-count">Active Course</span>
                
                    <div class="action-buttons" style="margin: 10px 0; display: flex; gap: 8px;">
                        <button class="action-btn edit-btn">✏️ Edit</button>
                        <button class="action-btn add-module-btn">➕ Add Module</button>
                    </div>

                    <div class="invite-form">
                        <input type="email" class="invite-input" placeholder="Student Email">
                        <button class="invite-btn">+ Invite</button>
                    </div>
                </div>
            </div>
        </template>

    <div id="editCourseModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('editCourseModal')">&times;</span>
            <h2>Edit Course</h2>
            <form id="editCourseForm">
                <input type="hidden" id="editCourseId">
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" id="editCourseTitle" required class="modal-input">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="editCourseDesc" required class="modal-input" rows="4"></textarea>
                </div>
                <button type="submit" class="submit-btn">Save Changes</button>
            </form>
        </div>
    </div>

    <div id="addModuleModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal('addModuleModal')">&times;</span>
            <h2>Add New Module</h2>
            <form id="addModuleForm">
                <input type="hidden" id="targetCourseId">
                <div class="form-group">
                    <label>Module Title</label>
                    <input type="text" id="moduleTitle" required class="modal-input" placeholder="e.g., Week 2: Advanced Grammar">
                </div>
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <textarea id="moduleDescription" class="modal-input" rows="3" placeholder="What will students learn in this module?"></textarea>
                </div>
                <div class="form-group">
                    <label>Video URL (Optional)</label>
                    <input type="url" id="moduleVideoUrl" class="modal-input" placeholder="https://youtube.com/...">
                </div>
                <button type="submit" class="submit-btn">Create Module</button>
            </form>
        </div>
    </div>

    <script src="js/teachercourse.js"></script>
</body>
</html>
